version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: fakenews-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fakenews
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fakenews-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
